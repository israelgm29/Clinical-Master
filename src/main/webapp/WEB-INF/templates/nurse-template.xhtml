<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:nav="jakarta.faces.composite/components">

    <h:head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>
            <ui:insert name="title">Enfermería - Hospital General</ui:insert>
        </title>

        <!-- ICONOS -->
        <link rel="stylesheet"
              href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css"/>

        <!-- CSS Global -->
        <h:outputStylesheet library="css" name="base.css"/>
        <h:outputStylesheet library="css" name="medic.css"/>
        <h:outputStylesheet library="css" name="topbar.css"/>
        <h:outputStylesheet library="css" name="profile.css"/>
        <ui:insert name="head"/>
    </h:head>

    <h:body>
        <div class="medic-layout">

            <!--
                CORRECCIÓN: user="#{userSession.user}" en lugar de displayProfile
                sidebarId="sidebar" debe coincidir con el id del aside en nurse-sidebar.xhtml
            -->
            <nav:navbar sidebarId="sidebar"
                        showNotifications="true"
                        user="#{userSession.user}"/>

            <!-- SIDEBAR -->
            <ui:include src="/WEB-INF/sidebars/nurse-sidebar.xhtml"/>

                <!-- Botón colapsar -->
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Colapsar menú">
                <i class="pi pi-id-card"></i>
            </button>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="medic-main-content" id="mainContent">

                <!-- HEADER -->
                <header class="content-header">
                    <h1 class="page-title">
                        <ui:insert name="page-title">Dashboard Enfermería</ui:insert>
                    </h1>
                    <div class="header-actions">
                        <ui:insert name="header-actions"/>
                    </div>
                </header>

                <!-- MENSAJES GLOBALES -->
                <p:growl id="globalMessages" showDetail="true" life="4000"/>

                <!-- CONTENIDO DE LA PÁGINA -->
                <div class="content-body fade-in">
                    <ui:insert name="content"/>
                </div>

            </main>
        </div>

        <!-- SCRIPTS DE LA PÁGINA -->
        <ui:insert name="scripts"/>

        <!--
            toggleSidebar() — función única aquí.
            El navbar.xhtml ya NO debe definir su propia toggleSidebar.
        -->
        <script>
            function toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                const main = document.getElementById('mainContent');
                const btn = document.querySelector('.sidebar-toggle-btn i');

                sidebar.classList.toggle('collapsed');

                if (sidebar.classList.contains('collapsed')) {
                    main.style.marginLeft = '72px';
                    btn.classList.replace('pi-bars', 'pi-chevron-right');
                } else {
                    main.style.marginLeft = '240px';
                    btn.classList.replace('pi-chevron-right', 'pi-bars');
                }
            }
        </script>

    </h:body>
</html>

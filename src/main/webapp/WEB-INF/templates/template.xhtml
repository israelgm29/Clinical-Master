<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Hospital General | Sistema Clínico</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <h:outputStylesheet library="css" name="jsfcrud.css"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <style>
            :root {
                --primary-color: #{themeBean.primaryColor};
                --primary-rgb: #{themeBean.primaryColorRGB};
                --secondary-color: #{themeBean.secondaryColor};
                --secondary-rgb: #{themeBean.secondaryColorRGB};
            }

            /* Aplicar colores dinámicos */
            .text-primary {
                color: var(--primary-color) !important;
            }

            .bg-primary {
                background-color: var(--primary-color) !important;
            }

            .ui-button.ui-button-success,
            .ui-button.ui-button-primary {
                background: var(--primary-color) !important;
                border-color: var(--primary-color) !important;
            }

            .ui-button.ui-button-secondary {
                background: var(--secondary-color) !important;
                border-color: var(--secondary-color) !important;
            }

            /* Iconos y acentos */
            .pi {
                color: var(--secondary-color);
            }

            /* Headers y títulos */
            h2, h3 {
                color: var(--primary-color);
            }
        </style>

    </h:head>

    <h:body>

        <div class="layout">

            <!-- SIDEBAR -->
            <ui:include src="/WEB-INF/templates/sidebar.xhtml"/>

            <!-- MAIN -->
            <div class="main">
                <!-- NAVBAR -->
                <header class="navbar">
                    <h2>
                        <ui:insert name="titulo">Panel</ui:insert>
                    </h2>
                    <div class="flex gap-2">
                        <span class="user-name">Dr. Montenegro</span>
                        <p:avatar icon="pi pi-user" shape="circle"/>
                    </div>
                </header>

                <!-- CONTENT -->
                <main class="content fade-in">
                    <ui:insert name="contenido"/>
                </main>
            </div>
        </div>

    </h:body>
</html>

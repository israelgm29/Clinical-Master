<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">

    <!-- SIDEBAR -->
    <aside class="medic-sidebar collapsed" id="sidebar">

        <!-- HEADER -->
        <div class="sidebar-header">
            <span class="material-symbols-outlined">medical_services</span>

            <div class="header-text">
                <div class="logo">Enf. #{loginBean.nombre}</div>
                <div class="subtitle">Enfermería</div>
            </div>
        </div>

        <!-- MENU -->
        <h:form prependId="false">
            <p:panelMenu id="menuloco" model="#{nurseMenuBean.menuModel}" 
                         styleClass="medic-panelmenu"
                         widgetVar="menu"/>

            <p:tooltip globalSelector="span" />

            <!-- FOOTER -->
            <div class="sidebar-footer">
                <p:commandButton icon="pi pi-sign-out"
                                 value="Cerrar sesión"
                                 action="#{loginController.logout}"
                                 styleClass="ui-button-secondary ui-button-sm"
                                 style="width: 100%;"/>

            </div>
        </h:form>

    </aside>
</ui:composition>

<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">

    <!-- SIDEBAR -->
    <aside class="medic-sidebar collapsed" id="sidebar">

        <!-- HEADER -->
        <div class="sidebar-header">
            <span class="material-symbols-outlined">stethoscope</span>

            <div class="header-text">
                <div class="logo">Dr. #{userSession.user.medic.fullName}</div>
                <div class="subtitle">Médico</div>
            </div>
        </div>

        <!-- MENU -->
        <p:panelMenu model="#{medicMenuBean.menuModel}" 
                     styleClass="medic-panelmenu"
                     widgetVar="menu"/>

        <!-- FOOTER -->
            <div class="sidebar-footer">
                <h:form id="sidebarForm">
                    <p:commandButton icon="pi pi-sign-out"
                                     value="Cerrar sesión"
                                     action="#{loginController.logout}"
                                     styleClass="ui-button-secondary ui-button-sm"
                                     style="width: 100%;"/>
                </h:form>
            </div>
    </aside>

</ui:composition>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

    <ui:composition template="/WEB-INF/templates/nurse-template.xhtml">

        <ui:define name="title">Registro de Signos Vitales</ui:define>
        <ui:define name="page-title">Toma de Signos Vitales</ui:define>

        <ui:define name="content">
            <h:form id="vitalForm">

                <p:growl id="messages" showDetail="true" life="4000"/>

                <!-- Grid de formulario -->
                <div class="card">
                    <div class="form-grid form-grid-3">

                        <div class="field">
                            <label>Temperatura (°C)</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.temperature}" />
                        </div>

                        <div class="field">
                            <label>Presión Sistólica</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.systolicpressure}" />
                        </div>

                        <div class="field">
                            <label>Presión Diastólica</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.diastolicpressure}" />
                        </div>

                        <div class="field">
                            <label>Pulso (bpm)</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.pulse}" />
                        </div>

                        <div class="field">
                            <label>Frecuencia Respiratoria</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.breathingfrequency}" />
                        </div>

                        <div class="field">
                            <label>SpO2 (%)</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.oxygensaturation}" />
                        </div>

                        <div class="field">
                            <label>Peso (kg)</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.weight}" />
                        </div>

                        <div class="field">
                            <label>Talla (cm)</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.tall}" />
                        </div>

                        <div class="field">
                            <label>IMC</label>
                            <p:inputText value="#{vitalsignController.newVitalsign.mass}" readonly="true"/>
                        </div>
                    </div>

                    <!-- Botones de acción -->
                    <div class="flex gap-2 mt-4">
                        <p:commandButton value="Guardar"
                                         action="#{vitalsignController.saveVitalsign}"
                                         update="vitalForm messages"
                                         styleClass="ui-button-success"/>
                        <p:commandButton value="Cancelar"
                                         action="#{vitalsignController.prepareNewVitalsign}"
                                         update="vitalForm"
                                         styleClass="ui-button-secondary"/>
                    </div>
                </div>

                <!-- Tabla de registros previos -->
                <p:dataTable id="vitalsignsTable"
                             value="#{vitalsignController.vitalsigns}"
                             var="v"
                             paginator="true"
                             rows="5"
                             styleClass="ui-datatable mt-4"
                             emptyMessage="No hay registros de signos vitales">

                    <p:column headerText="Fecha">
                        #{v.createdat}
                    </p:column>
                    <p:column headerText="Temperatura">
                        #{v.temperature} °C
                    </p:column>
                    <p:column headerText="Presión">
                        #{v.systolicpressure}/#{v.diastolicpressure}
                    </p:column>
                    <p:column headerText="Pulso">
                        #{v.pulse} bpm
                    </p:column>
                    <p:column headerText="SpO2">
                        #{v.oxygensaturation} %
                    </p:column>
                    <p:column headerText="Acciones" style="text-align:center;">
                        <p:commandButton icon="pi pi-pencil"
                                         action="#{vitalsignController.setSelectedVitalsign(v)}"
                                         update="vitalForm"
                                         styleClass="ui-button-primary ui-button-rounded"
                                         title="Editar"/>
                        <p:commandButton icon="pi pi-trash"
                                         action="#{vitalsignController.deleteVitalsign}"
                                         update="vitalsignsTable messages"
                                         styleClass="ui-button-danger ui-button-rounded"
                                         title="Eliminar"/>
                    </p:column>
                </p:dataTable>

            </h:form>
        </ui:define>
    </ui:composition>
</html>

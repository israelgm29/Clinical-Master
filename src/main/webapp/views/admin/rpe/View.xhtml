<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="RpeViewDlg" widgetVar="RpeViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewRpeTitle}">
            <h:form id="RpeViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{rpeController.selected != null}">
                        <h:outputText value="#{bundle.ViewRpeLabel_createdat}"/>
                        <h:outputText value="#{rpeController.selected.createdat}" title="#{bundle.ViewRpeTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewRpeLabel_createdby}"/>
                        <h:outputText value="#{rpeController.selected.createdby}" title="#{bundle.ViewRpeTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_editedat}"/>
                        <h:outputText value="#{rpeController.selected.editedat}" title="#{bundle.ViewRpeTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewRpeLabel_editedby}"/>
                        <h:outputText value="#{rpeController.selected.editedby}" title="#{bundle.ViewRpeTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_deletedat}"/>
                        <h:outputText value="#{rpeController.selected.deletedat}" title="#{bundle.ViewRpeTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewRpeLabel_deletedby}"/>
                        <h:outputText value="#{rpeController.selected.deletedby}" title="#{bundle.ViewRpeTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_id}"/>
                        <h:outputText value="#{rpeController.selected.id}" title="#{bundle.ViewRpeTitle_id}"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_head}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.head}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_neck}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.neck}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_chest}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.chest}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_abdomen}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.abdomen}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_pelvis}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.pelvis}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_extremities}"/>
                        <p:selectBooleanCheckbox value="#{rpeController.selected.extremities}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_observations}"/>
                        <h:outputText value="#{rpeController.selected.observations}" title="#{bundle.ViewRpeTitle_observations}"/>
                        <h:outputText value="#{bundle.ViewRpeLabel_medicalrecordid}"/>
                        <h:outputText value="#{rpeController.selected.medicalrecordid}" title="#{bundle.ViewRpeTitle_medicalrecordid}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="RpeViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

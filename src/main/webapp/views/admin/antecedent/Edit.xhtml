<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="AntecedentEditDlg" widgetVar="AntecedentEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditAntecedentTitle}">
            <h:form id="AntecedentEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{antecedentController.selected != null}">
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{antecedentController.selected.createdat}" title="#{bundle.EditAntecedentTitle_createdat}" required="true" requiredMessage="#{bundle.EditAntecedentRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{antecedentController.selected.createdby}" title="#{bundle.EditAntecedentTitle_createdby}" required="true" requiredMessage="#{bundle.EditAntecedentRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{antecedentController.selected.editedat}" title="#{bundle.EditAntecedentTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{antecedentController.selected.editedby}" title="#{bundle.EditAntecedentTitle_editedby}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{antecedentController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{antecedentController.selected.deletedat}" title="#{bundle.EditAntecedentTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{antecedentController.selected.deletedby}" title="#{bundle.EditAntecedentTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_id}" for="id" />
                        <p:inputText id="id" value="#{antecedentController.selected.id}" title="#{bundle.EditAntecedentTitle_id}" required="true" requiredMessage="#{bundle.EditAntecedentRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_personal}" for="personal" />
                        <p:inputText id="personal" value="#{antecedentController.selected.personal}" title="#{bundle.EditAntecedentTitle_personal}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_surgical}" for="surgical" />
                        <p:inputText id="surgical" value="#{antecedentController.selected.surgical}" title="#{bundle.EditAntecedentTitle_surgical}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_family}" for="family" />
                        <p:inputText id="family" value="#{antecedentController.selected.family}" title="#{bundle.EditAntecedentTitle_family}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_professional}" for="professional" />
                        <p:inputText id="professional" value="#{antecedentController.selected.professional}" title="#{bundle.EditAntecedentTitle_professional}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_habits}" for="habits" />
                        <p:inputText id="habits" value="#{antecedentController.selected.habits}" title="#{bundle.EditAntecedentTitle_habits}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_clinician}" for="clinician" />
                        <p:inputText id="clinician" value="#{antecedentController.selected.clinician}" title="#{bundle.EditAntecedentTitle_clinician}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_trauma}" for="trauma" />
                        <p:inputText id="trauma" value="#{antecedentController.selected.trauma}" title="#{bundle.EditAntecedentTitle_trauma}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_allergy}" for="allergy" />
                        <p:inputText id="allergy" value="#{antecedentController.selected.allergy}" title="#{bundle.EditAntecedentTitle_allergy}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_ago}" for="ago" />
                        <p:inputText id="ago" value="#{antecedentController.selected.ago}" title="#{bundle.EditAntecedentTitle_ago}" />
                        <p:outputLabel value="#{bundle.EditAntecedentLabel_patientid}" for="patientid" />
                        <p:selectOneMenu id="patientid" value="#{antecedentController.selected.patientid}" required="true" requiredMessage="#{bundle.EditAntecedentRequiredMessage_patientid}">
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{patientController.itemsAvailableSelectOne}"
                                           var="patientidItem"
                                           itemValue="#{patientidItem}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{antecedentController.update}" value="#{bundle.Save}" update="display,:AntecedentListForm:datalist,:growl" oncomplete="handleSubmit(args, 'AntecedentEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="AntecedentEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

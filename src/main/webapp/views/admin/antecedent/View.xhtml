<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="AntecedentViewDlg" widgetVar="AntecedentViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewAntecedentTitle}">
            <h:form id="AntecedentViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{antecedentController.selected != null}">
                        <h:outputText value="#{bundle.ViewAntecedentLabel_createdat}"/>
                        <h:outputText value="#{antecedentController.selected.createdat}" title="#{bundle.ViewAntecedentTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_createdby}"/>
                        <h:outputText value="#{antecedentController.selected.createdby}" title="#{bundle.ViewAntecedentTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_editedat}"/>
                        <h:outputText value="#{antecedentController.selected.editedat}" title="#{bundle.ViewAntecedentTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_editedby}"/>
                        <h:outputText value="#{antecedentController.selected.editedby}" title="#{bundle.ViewAntecedentTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{antecedentController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_deletedat}"/>
                        <h:outputText value="#{antecedentController.selected.deletedat}" title="#{bundle.ViewAntecedentTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_deletedby}"/>
                        <h:outputText value="#{antecedentController.selected.deletedby}" title="#{bundle.ViewAntecedentTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_id}"/>
                        <h:outputText value="#{antecedentController.selected.id}" title="#{bundle.ViewAntecedentTitle_id}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_personal}"/>
                        <h:outputText value="#{antecedentController.selected.personal}" title="#{bundle.ViewAntecedentTitle_personal}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_surgical}"/>
                        <h:outputText value="#{antecedentController.selected.surgical}" title="#{bundle.ViewAntecedentTitle_surgical}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_family}"/>
                        <h:outputText value="#{antecedentController.selected.family}" title="#{bundle.ViewAntecedentTitle_family}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_professional}"/>
                        <h:outputText value="#{antecedentController.selected.professional}" title="#{bundle.ViewAntecedentTitle_professional}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_habits}"/>
                        <h:outputText value="#{antecedentController.selected.habits}" title="#{bundle.ViewAntecedentTitle_habits}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_clinician}"/>
                        <h:outputText value="#{antecedentController.selected.clinician}" title="#{bundle.ViewAntecedentTitle_clinician}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_trauma}"/>
                        <h:outputText value="#{antecedentController.selected.trauma}" title="#{bundle.ViewAntecedentTitle_trauma}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_allergy}"/>
                        <h:outputText value="#{antecedentController.selected.allergy}" title="#{bundle.ViewAntecedentTitle_allergy}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_ago}"/>
                        <h:outputText value="#{antecedentController.selected.ago}" title="#{bundle.ViewAntecedentTitle_ago}"/>
                        <h:outputText value="#{bundle.ViewAntecedentLabel_patientid}"/>
                        <h:outputText value="#{antecedentController.selected.patientid}" title="#{bundle.ViewAntecedentTitle_patientid}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="AntecedentViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>

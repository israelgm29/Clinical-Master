<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="SpecialistEditDlg" widgetVar="SpecialistEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditSpecialistTitle}">
            <h:form id="SpecialistEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{specialistController.selected != null}">
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{specialistController.selected.createdat}" title="#{bundle.EditSpecialistTitle_createdat}" required="true" requiredMessage="#{bundle.EditSpecialistRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{specialistController.selected.createdby}" title="#{bundle.EditSpecialistTitle_createdby}" required="true" requiredMessage="#{bundle.EditSpecialistRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{specialistController.selected.editedat}" title="#{bundle.EditSpecialistTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{specialistController.selected.editedby}" title="#{bundle.EditSpecialistTitle_editedby}" />
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{specialistController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{specialistController.selected.deletedat}" title="#{bundle.EditSpecialistTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{specialistController.selected.deletedby}" title="#{bundle.EditSpecialistTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_id}" for="id" />
                        <p:inputText id="id" value="#{specialistController.selected.id}" title="#{bundle.EditSpecialistTitle_id}" required="true" requiredMessage="#{bundle.EditSpecialistRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_medicid}" for="medicid" />
                        <p:selectOneMenu id="medicid" value="#{specialistController.selected.medicid}" required="true" requiredMessage="#{bundle.EditSpecialistRequiredMessage_medicid}">
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{medicController.itemsAvailableSelectOne}"
                                           var="medicidItem"
                                           itemValue="#{medicidItem}"/>
                        </p:selectOneMenu>
                        <p:outputLabel value="#{bundle.EditSpecialistLabel_medicalspecialtyid}" for="medicalspecialtyid" />
                        <p:selectOneMenu id="medicalspecialtyid" value="#{specialistController.selected.medicalspecialtyid}" required="true" requiredMessage="#{bundle.EditSpecialistRequiredMessage_medicalspecialtyid}">
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{medicalspecialtyController.itemsAvailableSelectOne}"
                                           var="medicalspecialtyidItem"
                                           itemValue="#{medicalspecialtyidItem}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{specialistController.update}" value="#{bundle.Save}" update="display,:SpecialistListForm:datalist,:growl" oncomplete="handleSubmit(args, 'SpecialistEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="SpecialistEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

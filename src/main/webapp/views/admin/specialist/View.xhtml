<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="SpecialistViewDlg" widgetVar="SpecialistViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewSpecialistTitle}">
            <h:form id="SpecialistViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{specialistController.selected != null}">
                        <h:outputText value="#{bundle.ViewSpecialistLabel_createdat}"/>
                        <h:outputText value="#{specialistController.selected.createdat}" title="#{bundle.ViewSpecialistTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_createdby}"/>
                        <h:outputText value="#{specialistController.selected.createdby}" title="#{bundle.ViewSpecialistTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_editedat}"/>
                        <h:outputText value="#{specialistController.selected.editedat}" title="#{bundle.ViewSpecialistTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_editedby}"/>
                        <h:outputText value="#{specialistController.selected.editedby}" title="#{bundle.ViewSpecialistTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{specialistController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_deletedat}"/>
                        <h:outputText value="#{specialistController.selected.deletedat}" title="#{bundle.ViewSpecialistTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_deletedby}"/>
                        <h:outputText value="#{specialistController.selected.deletedby}" title="#{bundle.ViewSpecialistTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_id}"/>
                        <h:outputText value="#{specialistController.selected.id}" title="#{bundle.ViewSpecialistTitle_id}"/>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_medicid}"/>
                        <h:outputText value="#{specialistController.selected.medicid}" title="#{bundle.ViewSpecialistTitle_medicid}"/>
                        <h:outputText value="#{bundle.ViewSpecialistLabel_medicalspecialtyid}"/>
                        <h:outputText value="#{specialistController.selected.medicalspecialtyid}" title="#{bundle.ViewSpecialistTitle_medicalspecialtyid}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="SpecialistViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="TgroupEditDlg" widgetVar="TgroupEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditTgroupTitle}">
            <h:form id="TgroupEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{tgroupController.selected != null}">
                        <p:outputLabel value="#{bundle.EditTgroupLabel_id}" for="id" />
                        <p:inputText id="id" value="#{tgroupController.selected.id}" title="#{bundle.EditTgroupTitle_id}" required="true" requiredMessage="#{bundle.EditTgroupRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.EditTgroupLabel_name}" for="name" />
                        <p:inputText id="name" value="#{tgroupController.selected.name}" title="#{bundle.EditTgroupTitle_name}" required="true" requiredMessage="#{bundle.EditTgroupRequiredMessage_name}"/>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{tgroupController.update}" value="#{bundle.Save}" update="display,:TgroupListForm:datalist,:growl" oncomplete="handleSubmit(args, 'TgroupEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="TgroupEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

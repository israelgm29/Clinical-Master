<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="MedicalrecordEditDlg" widgetVar="MedicalrecordEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditMedicalrecordTitle}">
            <h:form id="MedicalrecordEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{medicalrecordController.selected != null}">
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{medicalrecordController.selected.createdat}" title="#{bundle.EditMedicalrecordTitle_createdat}" required="true" requiredMessage="#{bundle.EditMedicalrecordRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{medicalrecordController.selected.createdby}" title="#{bundle.EditMedicalrecordTitle_createdby}" required="true" requiredMessage="#{bundle.EditMedicalrecordRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{medicalrecordController.selected.editedat}" title="#{bundle.EditMedicalrecordTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{medicalrecordController.selected.editedby}" title="#{bundle.EditMedicalrecordTitle_editedby}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{medicalrecordController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{medicalrecordController.selected.deletedat}" title="#{bundle.EditMedicalrecordTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{medicalrecordController.selected.deletedby}" title="#{bundle.EditMedicalrecordTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_id}" for="id" />
                        <p:inputText id="id" value="#{medicalrecordController.selected.id}" title="#{bundle.EditMedicalrecordTitle_id}" required="true" requiredMessage="#{bundle.EditMedicalrecordRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_reason}" for="reason" />
                        <p:inputText id="reason" value="#{medicalrecordController.selected.reason}" title="#{bundle.EditMedicalrecordTitle_reason}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_currentillness}" for="currentillness" />
                        <p:inputText id="currentillness" value="#{medicalrecordController.selected.currentillness}" title="#{bundle.EditMedicalrecordTitle_currentillness}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_done}" for="done" />
                        <p:selectBooleanCheckbox id="done" value="#{medicalrecordController.selected.done}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_canceled}" for="canceled" />
                        <p:selectBooleanCheckbox id="canceled" value="#{medicalrecordController.selected.canceled}" />
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_medicid}" for="medicid" />
                        <p:selectOneMenu id="medicid" value="#{medicalrecordController.selected.medicid}" required="true" requiredMessage="#{bundle.EditMedicalrecordRequiredMessage_medicid}">
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{medicController.itemsAvailableSelectOne}"
                                           var="medicidItem"
                                           itemValue="#{medicidItem}"/>
                        </p:selectOneMenu>
                        <p:outputLabel value="#{bundle.EditMedicalrecordLabel_patientid}" for="patientid" />
                        <p:selectOneMenu id="patientid" value="#{medicalrecordController.selected.patientid}" required="true" requiredMessage="#{bundle.EditMedicalrecordRequiredMessage_patientid}">
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{patientController.itemsAvailableSelectOne}"
                                           var="patientidItem"
                                           itemValue="#{patientidItem}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{medicalrecordController.update}" value="#{bundle.Save}" update="display,:MedicalrecordListForm:datalist,:growl" oncomplete="handleSubmit(args, 'MedicalrecordEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="MedicalrecordEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

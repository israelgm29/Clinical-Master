<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/template.xhtml">


        <ui:define name="title">
            <h:outputText value="#{bundle.ListVitalsignTitle}"></h:outputText>
        </ui:define>

        <ui:define name="body">
            <h:form id="VitalsignListForm">
                <p:panel header="#{bundle.ListVitalsignTitle}">
                    <p:dataTable id="datalist" value="#{vitalsignController.items}" var="item"
                                 selectionMode="single" selection="#{vitalsignController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_createdat}"/>
                            </f:facet>
                            <h:outputText value="#{item.createdat}">
                                <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_createdby}"/>
                            </f:facet>
                            <h:outputText value="#{item.createdby}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_editedat}"/>
                            </f:facet>
                            <h:outputText value="#{item.editedat}">
                                <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_editedby}"/>
                            </f:facet>
                            <h:outputText value="#{item.editedby}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_deleted}"/>
                            </f:facet>
                            <p:selectBooleanCheckbox value="#{item.deleted}" disabled="true"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_deletedat}"/>
                            </f:facet>
                            <h:outputText value="#{item.deletedat}">
                                <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_deletedby}"/>
                            </f:facet>
                            <h:outputText value="#{item.deletedby}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_temperature}"/>
                            </f:facet>
                            <h:outputText value="#{item.temperature}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_systolicpressure}"/>
                            </f:facet>
                            <h:outputText value="#{item.systolicpressure}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_diastolicpressure}"/>
                            </f:facet>
                            <h:outputText value="#{item.diastolicpressure}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_pulse}"/>
                            </f:facet>
                            <h:outputText value="#{item.pulse}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_breathingfrequency}"/>
                            </f:facet>
                            <h:outputText value="#{item.breathingfrequency}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_oxygensaturation}"/>
                            </f:facet>
                            <h:outputText value="#{item.oxygensaturation}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_tall}"/>
                            </f:facet>
                            <h:outputText value="#{item.tall}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_weight}"/>
                            </f:facet>
                            <h:outputText value="#{item.weight}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_mass}"/>
                            </f:facet>
                            <h:outputText value="#{item.mass}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListVitalsignTitle_medicalrecordid}"/>
                            </f:facet>
                            <h:outputText value="#{item.medicalrecordid}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{vitalsignController.prepareCreate}" update=":VitalsignCreateForm" oncomplete="PF('VitalsignCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":VitalsignViewForm" oncomplete="PF('VitalsignViewDialog').show()" disabled="#{empty vitalsignController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":VitalsignEditForm" oncomplete="PF('VitalsignEditDialog').show()" disabled="#{empty vitalsignController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{vitalsignController.destroy}" update=":growl,datalist" disabled="#{empty vitalsignController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>

<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="TuserViewDlg" widgetVar="TuserViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewTuserTitle}">
            <h:form id="TuserViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{tuserController.selected != null}">
                        <h:outputText value="#{bundle.ViewTuserLabel_createdat}"/>
                        <h:outputText value="#{tuserController.selected.createdat}" title="#{bundle.ViewTuserTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewTuserLabel_createdby}"/>
                        <h:outputText value="#{tuserController.selected.createdby}" title="#{bundle.ViewTuserTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_editedat}"/>
                        <h:outputText value="#{tuserController.selected.editedat}" title="#{bundle.ViewTuserTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewTuserLabel_editedby}"/>
                        <h:outputText value="#{tuserController.selected.editedby}" title="#{bundle.ViewTuserTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{tuserController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_deletedat}"/>
                        <h:outputText value="#{tuserController.selected.deletedat}" title="#{bundle.ViewTuserTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewTuserLabel_deletedby}"/>
                        <h:outputText value="#{tuserController.selected.deletedby}" title="#{bundle.ViewTuserTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_id}"/>
                        <h:outputText value="#{tuserController.selected.id}" title="#{bundle.ViewTuserTitle_id}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_email}"/>
                        <h:outputText value="#{tuserController.selected.email}" title="#{bundle.ViewTuserTitle_email}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_password}"/>
                        <h:outputText value="#{tuserController.selected.password}" title="#{bundle.ViewTuserTitle_password}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_isactive}"/>
                        <p:selectBooleanCheckbox value="#{tuserController.selected.isactive}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_emailverified}"/>
                        <p:selectBooleanCheckbox value="#{tuserController.selected.emailverified}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_verificationtoken}"/>
                        <h:outputText value="#{tuserController.selected.verificationtoken}" title="#{bundle.ViewTuserTitle_verificationtoken}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_passresettoken}"/>
                        <h:outputText value="#{tuserController.selected.passresettoken}" title="#{bundle.ViewTuserTitle_passresettoken}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_profileid}"/>
                        <h:outputText value="#{tuserController.selected.profileid}" title="#{bundle.ViewTuserTitle_profileid}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_roleid}"/>
                        <h:outputText value="#{tuserController.selected.roleid}" title="#{bundle.ViewTuserTitle_roleid}"/>
                        <h:outputText value="#{bundle.ViewTuserLabel_medic}"/>
                        <h:outputText value="#{tuserController.selected.medic}" title="#{bundle.ViewTuserTitle_medic}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="TuserViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

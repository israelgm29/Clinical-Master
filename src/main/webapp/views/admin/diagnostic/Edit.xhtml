<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="DiagnosticEditDlg" widgetVar="DiagnosticEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditDiagnosticTitle}">
            <h:form id="DiagnosticEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{diagnosticController.selected != null}">
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{diagnosticController.selected.createdat}" title="#{bundle.EditDiagnosticTitle_createdat}" required="true" requiredMessage="#{bundle.EditDiagnosticRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{diagnosticController.selected.createdby}" title="#{bundle.EditDiagnosticTitle_createdby}" required="true" requiredMessage="#{bundle.EditDiagnosticRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{diagnosticController.selected.editedat}" title="#{bundle.EditDiagnosticTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{diagnosticController.selected.editedby}" title="#{bundle.EditDiagnosticTitle_editedby}" />
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{diagnosticController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{diagnosticController.selected.deletedat}" title="#{bundle.EditDiagnosticTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{diagnosticController.selected.deletedby}" title="#{bundle.EditDiagnosticTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_id}" for="id" />
                        <p:inputText id="id" value="#{diagnosticController.selected.id}" title="#{bundle.EditDiagnosticTitle_id}" required="true" requiredMessage="#{bundle.EditDiagnosticRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_diseaseid}" for="diseaseid" />
                        <p:selectOneMenu id="diseaseid" value="#{diagnosticController.selected.diseaseid}" >
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{diseaseController.itemsAvailableSelectOne}"
                                           var="diseaseidItem"
                                           itemValue="#{diseaseidItem}"/>
                        </p:selectOneMenu>
                        <p:outputLabel value="#{bundle.EditDiagnosticLabel_medicalrecordid}" for="medicalrecordid" />
                        <p:selectOneMenu id="medicalrecordid" value="#{diagnosticController.selected.medicalrecordid}" >
                            <f:selectItem itemLabel="#{bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{medicalrecordController.itemsAvailableSelectOne}"
                                           var="medicalrecordidItem"
                                           itemValue="#{medicalrecordidItem}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{diagnosticController.update}" value="#{bundle.Save}" update="display,:DiagnosticListForm:datalist,:growl" oncomplete="handleSubmit(args, 'DiagnosticEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="DiagnosticEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="DiagnosticViewDlg" widgetVar="DiagnosticViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewDiagnosticTitle}">
            <h:form id="DiagnosticViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{diagnosticController.selected != null}">
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_createdat}"/>
                        <h:outputText value="#{diagnosticController.selected.createdat}" title="#{bundle.ViewDiagnosticTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_createdby}"/>
                        <h:outputText value="#{diagnosticController.selected.createdby}" title="#{bundle.ViewDiagnosticTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_editedat}"/>
                        <h:outputText value="#{diagnosticController.selected.editedat}" title="#{bundle.ViewDiagnosticTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_editedby}"/>
                        <h:outputText value="#{diagnosticController.selected.editedby}" title="#{bundle.ViewDiagnosticTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{diagnosticController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_deletedat}"/>
                        <h:outputText value="#{diagnosticController.selected.deletedat}" title="#{bundle.ViewDiagnosticTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_deletedby}"/>
                        <h:outputText value="#{diagnosticController.selected.deletedby}" title="#{bundle.ViewDiagnosticTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_id}"/>
                        <h:outputText value="#{diagnosticController.selected.id}" title="#{bundle.ViewDiagnosticTitle_id}"/>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_diseaseid}"/>
                        <h:outputText value="#{diagnosticController.selected.diseaseid}" title="#{bundle.ViewDiagnosticTitle_diseaseid}"/>
                        <h:outputText value="#{bundle.ViewDiagnosticLabel_medicalrecordid}"/>
                        <h:outputText value="#{diagnosticController.selected.medicalrecordid}" title="#{bundle.ViewDiagnosticTitle_medicalrecordid}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="DiagnosticViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

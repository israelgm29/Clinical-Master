<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="RoleEditDlg" widgetVar="RoleEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditRoleTitle}">
            <h:form id="RoleEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{roleController.selected != null}">
                        <p:outputLabel value="#{bundle.EditRoleLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{roleController.selected.createdat}" title="#{bundle.EditRoleTitle_createdat}" required="true" requiredMessage="#{bundle.EditRoleRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.EditRoleLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{roleController.selected.createdby}" title="#{bundle.EditRoleTitle_createdby}" required="true" requiredMessage="#{bundle.EditRoleRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.EditRoleLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{roleController.selected.editedat}" title="#{bundle.EditRoleTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditRoleLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{roleController.selected.editedby}" title="#{bundle.EditRoleTitle_editedby}" />
                        <p:outputLabel value="#{bundle.EditRoleLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{roleController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.EditRoleLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{roleController.selected.deletedat}" title="#{bundle.EditRoleTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditRoleLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{roleController.selected.deletedby}" title="#{bundle.EditRoleTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.EditRoleLabel_id}" for="id" />
                        <p:inputText id="id" value="#{roleController.selected.id}" title="#{bundle.EditRoleTitle_id}" required="true" requiredMessage="#{bundle.EditRoleRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.EditRoleLabel_name}" for="name" />
                        <p:inputText id="name" value="#{roleController.selected.name}" title="#{bundle.EditRoleTitle_name}" required="true" requiredMessage="#{bundle.EditRoleRequiredMessage_name}"/>
                        <p:outputLabel value="#{bundle.EditRoleLabel_description}" for="description" />
                        <p:inputText id="description" value="#{roleController.selected.description}" title="#{bundle.EditRoleTitle_description}" required="true" requiredMessage="#{bundle.EditRoleRequiredMessage_description}"/>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{roleController.update}" value="#{bundle.Save}" update="display,:RoleListForm:datalist,:growl" oncomplete="handleSubmit(args, 'RoleEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="RoleEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

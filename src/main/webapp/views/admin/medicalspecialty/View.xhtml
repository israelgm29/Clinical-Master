<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="MedicalspecialtyViewDlg" widgetVar="MedicalspecialtyViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewMedicalspecialtyTitle}">
            <h:form id="MedicalspecialtyViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{medicalspecialtyController.selected != null}">
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_createdat}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.createdat}" title="#{bundle.ViewMedicalspecialtyTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_createdby}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.createdby}" title="#{bundle.ViewMedicalspecialtyTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_editedat}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.editedat}" title="#{bundle.ViewMedicalspecialtyTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_editedby}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.editedby}" title="#{bundle.ViewMedicalspecialtyTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{medicalspecialtyController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_deletedat}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.deletedat}" title="#{bundle.ViewMedicalspecialtyTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_deletedby}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.deletedby}" title="#{bundle.ViewMedicalspecialtyTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_id}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.id}" title="#{bundle.ViewMedicalspecialtyTitle_id}"/>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_name}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.name}" title="#{bundle.ViewMedicalspecialtyTitle_name}"/>
                        <h:outputText value="#{bundle.ViewMedicalspecialtyLabel_description}"/>
                        <h:outputText value="#{medicalspecialtyController.selected.description}" title="#{bundle.ViewMedicalspecialtyTitle_description}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="MedicalspecialtyViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

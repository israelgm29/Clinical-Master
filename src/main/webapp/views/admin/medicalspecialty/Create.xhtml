<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="MedicalspecialtyCreateDlg" widgetVar="MedicalspecialtyCreateDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.CreateMedicalspecialtyTitle}">
            <h:form id="MedicalspecialtyCreateForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{medicalspecialtyController.selected != null}">
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{medicalspecialtyController.selected.createdat}" title="#{bundle.EditMedicalspecialtyTitle_createdat}" required="true" requiredMessage="#{bundle.EditMedicalspecialtyRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{medicalspecialtyController.selected.createdby}" title="#{bundle.CreateMedicalspecialtyTitle_createdby}" required="true" requiredMessage="#{bundle.CreateMedicalspecialtyRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{medicalspecialtyController.selected.editedat}" title="#{bundle.EditMedicalspecialtyTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{medicalspecialtyController.selected.editedby}" title="#{bundle.CreateMedicalspecialtyTitle_editedby}" />
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{medicalspecialtyController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{medicalspecialtyController.selected.deletedat}" title="#{bundle.EditMedicalspecialtyTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{medicalspecialtyController.selected.deletedby}" title="#{bundle.CreateMedicalspecialtyTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_id}" for="id" />
                        <p:inputText id="id" value="#{medicalspecialtyController.selected.id}" title="#{bundle.CreateMedicalspecialtyTitle_id}" required="true" requiredMessage="#{bundle.CreateMedicalspecialtyRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_name}" for="name" />
                        <p:inputText id="name" value="#{medicalspecialtyController.selected.name}" title="#{bundle.CreateMedicalspecialtyTitle_name}" required="true" requiredMessage="#{bundle.CreateMedicalspecialtyRequiredMessage_name}"/>
                        <p:outputLabel value="#{bundle.CreateMedicalspecialtyLabel_description}" for="description" />
                        <p:inputText id="description" value="#{medicalspecialtyController.selected.description}" title="#{bundle.CreateMedicalspecialtyTitle_description}" />
                    </p:panelGrid>
                    <p:commandButton actionListener="#{medicalspecialtyController.create}" value="#{bundle.Save}" update="display,:MedicalspecialtyListForm:datalist,:growl" oncomplete="handleSubmit(args,'MedicalspecialtyCreateDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="MedicalspecialtyCreateDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

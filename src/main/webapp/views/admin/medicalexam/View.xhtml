<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="MedicalexamViewDlg" widgetVar="MedicalexamViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewMedicalexamTitle}">
            <h:form id="MedicalexamViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{medicalexamController.selected != null}">
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_createdat}"/>
                        <h:outputText value="#{medicalexamController.selected.createdat}" title="#{bundle.ViewMedicalexamTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_createdby}"/>
                        <h:outputText value="#{medicalexamController.selected.createdby}" title="#{bundle.ViewMedicalexamTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_editedat}"/>
                        <h:outputText value="#{medicalexamController.selected.editedat}" title="#{bundle.ViewMedicalexamTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_editedby}"/>
                        <h:outputText value="#{medicalexamController.selected.editedby}" title="#{bundle.ViewMedicalexamTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{medicalexamController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_deletedat}"/>
                        <h:outputText value="#{medicalexamController.selected.deletedat}" title="#{bundle.ViewMedicalexamTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_deletedby}"/>
                        <h:outputText value="#{medicalexamController.selected.deletedby}" title="#{bundle.ViewMedicalexamTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_id}"/>
                        <h:outputText value="#{medicalexamController.selected.id}" title="#{bundle.ViewMedicalexamTitle_id}"/>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_examid}"/>
                        <h:outputText value="#{medicalexamController.selected.examid}" title="#{bundle.ViewMedicalexamTitle_examid}"/>
                        <h:outputText value="#{bundle.ViewMedicalexamLabel_medicalrecordid}"/>
                        <h:outputText value="#{medicalexamController.selected.medicalrecordid}" title="#{bundle.ViewMedicalexamTitle_medicalrecordid}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="MedicalexamViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

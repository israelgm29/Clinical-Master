<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="ProfileViewDlg" widgetVar="ProfileViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewProfileTitle}">
            <h:form id="ProfileViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{profileController.selected != null}">
                        <h:outputText value="#{bundle.ViewProfileLabel_createdat}"/>
                        <h:outputText value="#{profileController.selected.createdat}" title="#{bundle.ViewProfileTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewProfileLabel_createdby}"/>
                        <h:outputText value="#{profileController.selected.createdby}" title="#{bundle.ViewProfileTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_editedat}"/>
                        <h:outputText value="#{profileController.selected.editedat}" title="#{bundle.ViewProfileTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewProfileLabel_editedby}"/>
                        <h:outputText value="#{profileController.selected.editedby}" title="#{bundle.ViewProfileTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{profileController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_deletedat}"/>
                        <h:outputText value="#{profileController.selected.deletedat}" title="#{bundle.ViewProfileTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewProfileLabel_deletedby}"/>
                        <h:outputText value="#{profileController.selected.deletedby}" title="#{bundle.ViewProfileTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_id}"/>
                        <h:outputText value="#{profileController.selected.id}" title="#{bundle.ViewProfileTitle_id}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_dni}"/>
                        <h:outputText value="#{profileController.selected.dni}" title="#{bundle.ViewProfileTitle_dni}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_passport}"/>
                        <h:outputText value="#{profileController.selected.passport}" title="#{bundle.ViewProfileTitle_passport}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_lastname}"/>
                        <h:outputText value="#{profileController.selected.lastname}" title="#{bundle.ViewProfileTitle_lastname}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_firstname}"/>
                        <h:outputText value="#{profileController.selected.firstname}" title="#{bundle.ViewProfileTitle_firstname}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_telephone}"/>
                        <h:outputText value="#{profileController.selected.telephone}" title="#{bundle.ViewProfileTitle_telephone}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_mobile}"/>
                        <h:outputText value="#{profileController.selected.mobile}" title="#{bundle.ViewProfileTitle_mobile}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_email}"/>
                        <h:outputText value="#{profileController.selected.email}" title="#{bundle.ViewProfileTitle_email}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_image}"/>
                        <h:outputText value="#{profileController.selected.image}" title="#{bundle.ViewProfileTitle_image}"/>
                        <h:outputText value="#{bundle.ViewProfileLabel_address}"/>
                        <h:outputText value="#{profileController.selected.address}" title="#{bundle.ViewProfileTitle_address}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="ProfileViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

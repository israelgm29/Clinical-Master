<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="ProfileCreateDlg" widgetVar="ProfileCreateDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.CreateProfileTitle}">
            <h:form id="ProfileCreateForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{profileController.selected != null}">
                        <p:outputLabel value="#{bundle.CreateProfileLabel_createdat}" for="createdat" />
                        <p:calendar id="createdat" pattern="MM/dd/yyyy HH:mm:ss" value="#{profileController.selected.createdat}" title="#{bundle.EditProfileTitle_createdat}" required="true" requiredMessage="#{bundle.EditProfileRequiredMessage_createdat}" showOn="button"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_createdby}" for="createdby" />
                        <p:inputText id="createdby" value="#{profileController.selected.createdby}" title="#{bundle.CreateProfileTitle_createdby}" required="true" requiredMessage="#{bundle.CreateProfileRequiredMessage_createdby}"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_editedat}" for="editedat" />
                        <p:calendar id="editedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{profileController.selected.editedat}" title="#{bundle.EditProfileTitle_editedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_editedby}" for="editedby" />
                        <p:inputText id="editedby" value="#{profileController.selected.editedby}" title="#{bundle.CreateProfileTitle_editedby}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_deleted}" for="deleted" />
                        <p:selectBooleanCheckbox id="deleted" value="#{profileController.selected.deleted}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_deletedat}" for="deletedat" />
                        <p:calendar id="deletedat" pattern="MM/dd/yyyy HH:mm:ss" value="#{profileController.selected.deletedat}" title="#{bundle.EditProfileTitle_deletedat}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_deletedby}" for="deletedby" />
                        <p:inputText id="deletedby" value="#{profileController.selected.deletedby}" title="#{bundle.CreateProfileTitle_deletedby}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_id}" for="id" />
                        <p:inputText id="id" value="#{profileController.selected.id}" title="#{bundle.CreateProfileTitle_id}" required="true" requiredMessage="#{bundle.CreateProfileRequiredMessage_id}"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_dni}" for="dni" />
                        <p:inputText id="dni" value="#{profileController.selected.dni}" title="#{bundle.CreateProfileTitle_dni}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_passport}" for="passport" />
                        <p:inputText id="passport" value="#{profileController.selected.passport}" title="#{bundle.CreateProfileTitle_passport}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_lastname}" for="lastname" />
                        <p:inputText id="lastname" value="#{profileController.selected.lastname}" title="#{bundle.CreateProfileTitle_lastname}" required="true" requiredMessage="#{bundle.CreateProfileRequiredMessage_lastname}"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_firstname}" for="firstname" />
                        <p:inputText id="firstname" value="#{profileController.selected.firstname}" title="#{bundle.CreateProfileTitle_firstname}" required="true" requiredMessage="#{bundle.CreateProfileRequiredMessage_firstname}"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_telephone}" for="telephone" />
                        <p:inputText id="telephone" value="#{profileController.selected.telephone}" title="#{bundle.CreateProfileTitle_telephone}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_mobile}" for="mobile" />
                        <p:inputText id="mobile" value="#{profileController.selected.mobile}" title="#{bundle.CreateProfileTitle_mobile}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_email}" for="email" />
                        <p:inputText id="email" value="#{profileController.selected.email}" title="#{bundle.CreateProfileTitle_email}" required="true" requiredMessage="#{bundle.CreateProfileRequiredMessage_email}"/>
                        <p:outputLabel value="#{bundle.CreateProfileLabel_image}" for="image" />
                        <p:inputText id="image" value="#{profileController.selected.image}" title="#{bundle.CreateProfileTitle_image}" />
                        <p:outputLabel value="#{bundle.CreateProfileLabel_address}" for="address" />
                        <p:inputText id="address" value="#{profileController.selected.address}" title="#{bundle.CreateProfileTitle_address}" required="true" requiredMessage="#{bundle.CreateProfileRequiredMessage_address}"/>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{profileController.create}" value="#{bundle.Save}" update="display,:ProfileListForm:datalist,:growl" oncomplete="handleSubmit(args,'ProfileCreateDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="ProfileCreateDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

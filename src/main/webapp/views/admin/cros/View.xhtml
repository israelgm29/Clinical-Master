<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="CrosViewDlg" widgetVar="CrosViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewCrosTitle}">
            <h:form id="CrosViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{crosController.selected != null}">
                        <h:outputText value="#{bundle.ViewCrosLabel_createdat}"/>
                        <h:outputText value="#{crosController.selected.createdat}" title="#{bundle.ViewCrosTitle_createdat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewCrosLabel_createdby}"/>
                        <h:outputText value="#{crosController.selected.createdby}" title="#{bundle.ViewCrosTitle_createdby}"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_editedat}"/>
                        <h:outputText value="#{crosController.selected.editedat}" title="#{bundle.ViewCrosTitle_editedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewCrosLabel_editedby}"/>
                        <h:outputText value="#{crosController.selected.editedby}" title="#{bundle.ViewCrosTitle_editedby}"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_deleted}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.deleted}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_deletedat}"/>
                        <h:outputText value="#{crosController.selected.deletedat}" title="#{bundle.ViewCrosTitle_deletedat}">
                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewCrosLabel_deletedby}"/>
                        <h:outputText value="#{crosController.selected.deletedby}" title="#{bundle.ViewCrosTitle_deletedby}"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_id}"/>
                        <h:outputText value="#{crosController.selected.id}" title="#{bundle.ViewCrosTitle_id}"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_senseorgans}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.senseorgans}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_respiratory}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.respiratory}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_cardiovascular}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.cardiovascular}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_digestive}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.digestive}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_genital}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.genital}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_urinary}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.urinary}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_skeletalmuscle}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.skeletalmuscle}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_endocrine}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.endocrine}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_lymphaticheme}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.lymphaticheme}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_nervous}"/>
                        <p:selectBooleanCheckbox value="#{crosController.selected.nervous}" disabled="true"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_observations}"/>
                        <h:outputText value="#{crosController.selected.observations}" title="#{bundle.ViewCrosTitle_observations}"/>
                        <h:outputText value="#{bundle.ViewCrosLabel_medicalrecordid}"/>
                        <h:outputText value="#{crosController.selected.medicalrecordid}" title="#{bundle.ViewCrosTitle_medicalrecordid}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="CrosViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>

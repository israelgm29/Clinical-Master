<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/template.xhtml">

    <ui:define name="titulo">Resumen de Citas</ui:define>

    <ui:define name="contenido">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-medium mb-4">Próximas Citas</h3>
            <p:dataTable value="#{null}" var="item">
                <p:column headerText="Estado">
                    <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs">Pendiente</span>
                </p:column>
                <p:column headerText="Detalle">
                    No hay citas para mostrar.
                </p:column>
            </p:dataTable>
        </div>
    </ui:define>

</ui:composition>
